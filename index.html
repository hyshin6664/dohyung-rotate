<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>도형 돌리고 뒤집기</title>
<style>
  :root{
    --bg:#fff7ec;--panel:#fffdf7;--ink:#2b2b2b;
    --accent:#ff7a59;--btn:#ffe9d6;--btn-b:#ffb88c;
    --btn-flip:#dcefff;--btn-flip-b:#86bdff;
    --btn-ccw:#fff0e0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Pretendard","Noto Sans KR","맑은 고딕",sans-serif;overscroll-behavior:none;height:100%}
  body{min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:#ffd9a8;border-bottom:4px solid #f0b070;flex-shrink:0}
  h1{margin:0;font-size:30px;letter-spacing:-1px}
  .ver{font-size:14px;color:#7a5a3a;background:#fff3df;border:1px solid #f0c98b;padding:4px 12px;border-radius:999px}
  .tabs{display:flex;gap:0;background:#fff3df;border-bottom:3px solid #f0b070;padding:0 14px;flex-shrink:0}
  .tab{flex:1;max-width:280px;background:transparent;border:none;border-bottom:5px solid transparent;padding:16px 10px;font-size:22px;font-weight:800;color:#8a6a3a;cursor:pointer;transition:all .15s;letter-spacing:-.5px}
  .tab.on{color:#c0421f;border-bottom-color:#c0421f;background:#fff7ec}
  .tab:active{transform:scale(.97)}
  .tab.dim{opacity:.45}
  .screen{flex:1;display:none;padding:20px;max-width:1400px;margin:0 auto;width:100%}
  .screen.on{display:block}

  /* ===== 선택 화면 ===== */
  #pickScreen h2{margin:0 0 18px;font-size:28px;color:#7a4a1a;text-align:center}
  .shapes{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  @media (max-width:900px){.shapes{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:600px){.shapes{grid-template-columns:repeat(2,1fr)}}
  .shape-btn{background:#fff;border:4px solid #e0c8a0;border-radius:22px;padding:14px;cursor:pointer;transition:transform .12s;box-shadow:0 5px 0 #e0c8a0}
  .shape-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #e0c8a0}
  .shape-btn svg{display:block;width:100%;height:auto}
  .shape-btn .label{font-size:22px;font-weight:800;color:#5a3a10;margin-top:8px;text-align:center}

  /* ===== 플레이 화면 ===== */
  #playScreen{display:none;flex-direction:column;gap:14px}
  #playScreen.on{display:flex}
  .topbar{display:flex;align-items:center;gap:12px}
  .back{background:#fff;border:3px solid #c9a878;border-radius:14px;padding:10px 18px;font-size:20px;font-weight:800;color:#5a3a10;cursor:pointer;box-shadow:0 4px 0 #c9a878}
  .back:active{transform:translateY(2px);box-shadow:0 2px 0 #c9a878}
  .curname{font-size:24px;font-weight:800;color:#7a4a1a}

  .play-wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media (max-width:900px){.play-wrap{grid-template-columns:1fr}}

  .stage{display:flex;justify-content:center;align-items:center;background:#fff;border:4px dashed #c9a878;border-radius:20px;padding:10px;aspect-ratio:1/1}
  .stage svg{width:100%;height:100%;touch-action:none}
  .grid line{stroke:#d9c7a5;stroke-width:1.5;stroke-dasharray:4 4}
  .axis{stroke:#b58a4a;stroke-width:2}
  .ghost{fill:#f1e7d3;stroke:#b8a47a;stroke-width:2.5;stroke-dasharray:6 5}
  .shape-g{transform-box:fill-box;transform-origin:center;transition:transform .55s cubic-bezier(.5,.05,.3,1)}
  .shape{fill:#ffd9c2;stroke:#c0421f;stroke-width:3.5;stroke-linejoin:round}

  .panel{display:flex;flex-direction:column;gap:12px}
  .status{background:#fff8e8;border:3px dashed #e6c98f;border-radius:16px;padding:14px;font-size:20px;color:#5a3a10;text-align:center;font-weight:700;min-height:60px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px}
  .pill{background:#fff;border:2px solid #d9c7a5;border-radius:999px;padding:4px 14px}
  .pill b{color:#c0421f}

  .controls{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .btn{font-size:22px;font-weight:800;padding:22px 8px;border-radius:18px;border:4px solid var(--btn-b);background:var(--btn);cursor:pointer;color:#5a2c0a;line-height:1.15;min-height:88px;transition:transform .08s,box-shadow .08s;box-shadow:0 5px 0 var(--btn-b)}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--btn-b)}
  .btn small{display:block;font-size:16px;font-weight:700;opacity:.85;margin-top:4px}
  .btn.ccw{background:var(--btn-ccw)}
  .btn.flip{background:var(--btn-flip);border-color:var(--btn-flip-b);box-shadow:0 5px 0 var(--btn-flip-b);color:#1e3e6c}
  .btn.flip:active{box-shadow:0 2px 0 var(--btn-flip-b)}
  .btn.reset{background:#e9f8df;border-color:#9fcf7e;box-shadow:0 5px 0 #9fcf7e;color:#234a13;font-size:24px;grid-column:span 2}
  .btn.reset:active{box-shadow:0 2px 0 #9fcf7e}

  .group-title{font-size:16px;font-weight:800;color:#7a4a1a;margin:4px 0 -4px 4px;letter-spacing:-.3px}

  /* ===== 길찾기 ===== */
  .maze-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .puz-pick{display:flex;gap:10px;flex-wrap:wrap}
  .puz-btn{font-size:18px;font-weight:800;padding:12px 18px;border-radius:14px;border:3px solid #c9a878;background:#fff;color:#5a3a10;cursor:pointer;box-shadow:0 4px 0 #c9a878}
  .puz-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c9a878}
  .puz-btn.on{background:#c0421f;border-color:#7a2c12;color:#fff;box-shadow:0 4px 0 #7a2c12}
  .maze-help{background:#fff8e8;border:3px dashed #e6c98f;border-radius:14px;padding:12px;font-size:18px;color:#5a3a10;font-weight:700;text-align:center;margin:14px 0}
  .maze-stage{display:flex;justify-content:center;align-items:center;background:#8b6a3a;border:5px solid #5a3a10;border-radius:20px;padding:8px;max-width:620px;margin:0 auto;aspect-ratio:1/1}
  .maze-stage svg{width:100%;height:100%;touch-action:none}
  .maze-status{margin:14px auto 0;max-width:620px;background:#fff;border:3px solid #c9a878;border-radius:14px;padding:14px;font-size:20px;color:#5a3a10;font-weight:800;text-align:center}
  .maze-status.ok{background:#dff5cf;border-color:#7bc96f;color:#234a13}
  .cell-bg{fill:#a47b48}
  .road{fill:#f1d9aa;stroke:#7a5a2a;stroke-width:2}
  .rot-cell .road{fill:#fff3a6}
  .rot-cell{cursor:pointer}
  .rot-cell .ring{fill:none;stroke:#c0421f;stroke-width:3;stroke-dasharray:6 4}
  .rot-piece{transform-box:fill-box;transform-origin:center;transition:transform .35s cubic-bezier(.5,.05,.3,1)}
  .num-badge{fill:#c0421f}
  .num-text{fill:#fff;font-size:22px;font-weight:900;font-family:sans-serif;text-anchor:middle;dominant-baseline:central}
  .celebrate{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100}
  .celebrate.on{display:flex;animation:fade .25s}
  .celebrate-card{background:#fff;border-radius:24px;padding:30px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pop .3s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  footer{text-align:right;padding:10px 20px;font-size:12px;color:#9b7a52;flex-shrink:0}
</style>
</head>
<body>
<header>
  <h1>🔄 도형 돌리고 뒤집기</h1>
  <span class="ver">v1.3</span>
</header>

<nav class="tabs">
  <button class="tab on" data-tab="pick">🟧 도형 고르기</button>
  <button class="tab" data-tab="play" id="tabPlay">🔄 돌리고 뒤집기</button>
  <button class="tab" data-tab="maze">🧩 길찾기</button>
</nav>

<!-- ① 도형 선택 화면 -->
<section class="screen on" id="pickScreen">
  <h2>👇 도형을 골라봐!</h2>
  <div class="shapes" id="shapes"></div>
</section>

<!-- ② 플레이 화면 -->
<section class="screen" id="playScreen">
  <div class="topbar">
    <div class="curname" id="curname"></div>
  </div>
  <div class="play-wrap">
    <div class="stage">
      <svg viewBox="0 0 600 600" id="stage" aria-label="도형판">
        <g class="grid" id="grid"></g>
        <g id="ghostG"><polygon class="ghost" id="ghost"></polygon></g>
        <g class="shape-g" id="shapeG"><polygon class="shape" id="shape"></polygon></g>
      </svg>
    </div>
    <div class="panel">
      <div class="status" id="status"></div>

      <div class="group-title">↻ 시계 방향으로 돌리기</div>
      <div class="controls">
        <button class="btn" data-rot="90">↻ 90°<small>시계방향</small></button>
        <button class="btn" data-rot="180">↻ 180°<small>시계방향</small></button>
        <button class="btn" data-rot="270">↻ 270°<small>시계방향</small></button>
        <button class="btn" data-rot="360">↻ 360°<small>한 바퀴</small></button>
      </div>

      <div class="group-title">↺ 시계 반대 방향으로 돌리기</div>
      <div class="controls">
        <button class="btn ccw" data-rot="-90">↺ 90°<small>반대방향</small></button>
        <button class="btn ccw" data-rot="-180">↺ 180°<small>반대방향</small></button>
        <button class="btn ccw" data-rot="-270">↺ 270°<small>반대방향</small></button>
        <button class="btn ccw" data-rot="-360">↺ 360°<small>한 바퀴</small></button>
      </div>

      <div class="group-title">🔁 뒤집기</div>
      <div class="controls">
        <button class="btn flip" data-flip="L">⬅ 왼쪽으로<small>뒤집기</small></button>
        <button class="btn flip" data-flip="R">➡ 오른쪽으로<small>뒤집기</small></button>
        <button class="btn flip" data-flip="U">⬆ 위쪽으로<small>뒤집기</small></button>
        <button class="btn flip" data-flip="D">⬇ 아래쪽으로<small>뒤집기</small></button>
        <button class="btn reset" id="reset">🔄 처음으로 되돌리기</button>
      </div>
    </div>
  </div>
</section>

<!-- ③ 길찾기 화면 -->
<section class="screen" id="mazeScreen">
  <div class="maze-top">
    <div class="puz-pick" id="puzPick"></div>
    <button class="back" id="mazeReset">🔄 처음으로</button>
  </div>
  <div class="maze-help">길 조각을 손가락으로 톡! 누르면 90°씩 돌아가. 🐱부터 🏆까지 길을 이어보자!</div>
  <div class="maze-stage">
    <svg viewBox="0 0 540 540" id="maze"></svg>
  </div>
  <div class="maze-status" id="mazeStatus">길을 이어봐!</div>
</section>

<div class="celebrate" id="celebrate">
  <div class="celebrate-card">
    <div style="font-size:80px">🎉</div>
    <div style="font-size:32px;font-weight:900;color:#c0421f;margin:8px 0">잘했어!</div>
    <div style="font-size:18px;color:#5a3a10;margin-bottom:16px">길을 찾았어 🐱➡️🏆</div>
    <button class="btn reset" id="nextPuz" style="font-size:20px;padding:14px 24px;grid-column:auto">다음 문제 ➡</button>
  </div>
</div>

<footer>CDN & Cloud is by Solbox..</footer>

<script>
// ===== 도형 정의 (6x6 격자, 0~6) =====
const SHAPES = [
  { id:'L',    name:'ㄴ자',      pts:[[1,1],[4,1],[4,2],[2,2],[2,5],[1,5]] },
  { id:'L2',   name:'계단',      pts:[[1,2],[3,2],[3,3],[4,3],[4,5],[1,5]] },
  { id:'PLUS', name:'십자',      pts:[[2,1],[4,1],[4,2],[5,2],[5,4],[4,4],[4,5],[2,5],[2,4],[1,4],[1,2],[2,2]] },
  { id:'HOUSE',name:'집 모양',   pts:[[1,5],[1,3],[3,1],[5,3],[5,5]] },
  { id:'ARROW',name:'화살표',    pts:[[2,5],[2,3],[1,3],[3,1],[5,3],[4,3],[4,5]] },
  { id:'TRI1', name:'직각삼각형', pts:[[1,1],[5,1],[1,5]] },
  { id:'TRI2', name:'삼각형',    pts:[[1,1],[5,3],[1,5]] },
  { id:'TRAP', name:'사다리꼴',  pts:[[1,5],[2,1],[4,1],[5,5]] },
  { id:'PAR',  name:'평행사변형', pts:[[1,5],[3,1],[5,1],[3,5]] },
  { id:'T',    name:'T자',       pts:[[1,1],[5,1],[5,2],[4,2],[4,5],[2,5],[2,2],[1,2]] },
  { id:'PENT', name:'오각형',    pts:[[1,3],[3,1],[5,2],[5,5],[2,5]] },
  { id:'Z',    name:'Z자',       pts:[[1,1],[4,1],[4,3],[5,3],[5,5],[2,5],[2,3],[1,3]] }
];

// ===== 선택 화면 미니뷰 =====
const shapesEl = document.getElementById('shapes');
SHAPES.forEach((s)=>{
  const btn=document.createElement('button');
  btn.className='shape-btn';
  btn.innerHTML=`
    <svg viewBox="0 0 60 60">
      <rect x="2" y="2" width="56" height="56" fill="none" stroke="#d4b886" stroke-width="1.5" stroke-dasharray="3 3"/>
      <polygon points="${s.pts.map(p=>`${p[0]*9+3},${p[1]*9+3}`).join(' ')}" fill="#ffd9c2" stroke="#c0421f" stroke-width="2"/>
    </svg>
    <div class="label">${s.name}</div>`;
  btn.onclick=()=>openPlay(s);
  shapesEl.appendChild(btn);
});

// ===== 좌표 시스템 =====
const VB = 600, MARGIN = 40, GRID = 6;
const CELL = (VB - MARGIN*2) / GRID;
const toX = gx => MARGIN + gx * CELL;
const toY = gy => MARGIN + gy * CELL;

const gridG = document.getElementById('grid');
for(let i=0;i<=GRID;i++){
  const v=document.createElementNS('http://www.w3.org/2000/svg','line');
  v.setAttribute('x1',toX(i));v.setAttribute('y1',toY(0));
  v.setAttribute('x2',toX(i));v.setAttribute('y2',toY(GRID));
  if(i===0||i===GRID) v.setAttribute('class','axis');
  gridG.appendChild(v);
  const h=document.createElementNS('http://www.w3.org/2000/svg','line');
  h.setAttribute('x1',toX(0));h.setAttribute('y1',toY(i));
  h.setAttribute('x2',toX(GRID));h.setAttribute('y2',toY(i));
  if(i===0||i===GRID) h.setAttribute('class','axis');
  gridG.appendChild(h);
}

// ===== 상태 =====
let state = { rot:0, fx:1, fy:1, current:null };
const shapeEl = document.getElementById('shape');
const ghostEl = document.getElementById('ghost');
const shapeG = document.getElementById('shapeG');
const statusEl = document.getElementById('status');
const curnameEl = document.getElementById('curname');

function openPlay(s){
  state.current = s;
  state.rot = 0; state.fx = 1; state.fy = 1;
  const pointsStr = s.pts.map(p=>`${toX(p[0])},${toY(p[1])}`).join(' ');
  shapeEl.setAttribute('points', pointsStr);
  ghostEl.setAttribute('points', pointsStr);
  shapeG.style.transition='none';
  applyTransform();
  requestAnimationFrame(()=>{shapeG.style.transition='';});
  curnameEl.textContent = '🟧 ' + s.name;
  updateStatus();
  document.getElementById('tabPlay').classList.remove('dim');
  switchTab('play');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  document.getElementById('pickScreen').classList.toggle('on', t==='pick');
  document.getElementById('playScreen').classList.toggle('on', t==='play');
  window.scrollTo(0,0);
}
document.querySelectorAll('.tab').forEach(b=>{
  b.onclick = ()=>{
    if(b.dataset.tab==='play' && !state.current){
      // 아직 도형 안 골랐으면 안내
      const t=document.querySelector('.tab.on');
      document.getElementById('tabPlay').animate(
        [{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],
        {duration:240}
      );
      return;
    }
    switchTab(b.dataset.tab);
  };
});
// 초기: 돌리기 탭 흐리게
document.getElementById('tabPlay').classList.add('dim');

/* ===================== 🧩 길찾기 ===================== */
// 길 조각 타입: S(직선) / C(코너) / T(T자) / X(십자) / STUB(끝조각)
// 회전 0~3 (시계방향 90°씩)
const ROT_DIR = {N:'E',E:'S',S:'W',W:'N'};
const OPP = {N:'S',E:'W',S:'N',W:'E'};
const DXY = {N:[0,-1],E:[1,0],S:[0,1],W:[-1,0]};
const BASE_SIDES = {S:['E','W'], C:['N','E'], T:['E','S','W'], X:['N','E','S','W'], STUB:['E']};
function sidesOf(type, rot){
  let s = BASE_SIDES[type].slice();
  for(let i=0;i<rot;i++) s = s.map(d=>ROT_DIR[d]);
  return s;
}

// 퍼즐 정의 (5x5)
// 셀: {c,r,type,rot,rotatable?,num?,start?,end?}
const PUZZLES = [
  { name:'1단계', size:5, cells:[
    {c:0,r:2,type:'STUB',rot:0,start:true},
    {c:1,r:2,type:'S',rot:1,rotatable:true,num:1},
    {c:2,r:2,type:'S',rot:0},
    {c:3,r:2,type:'S',rot:1,rotatable:true,num:2},
    {c:4,r:2,type:'STUB',rot:2,end:true},
  ]},
  { name:'2단계', size:5, cells:[
    {c:0,r:3,type:'STUB',rot:0,start:true},
    {c:1,r:3,type:'C',rot:0,rotatable:true,num:1},   // 정답: rot=3 (W,N)
    {c:1,r:2,type:'S',rot:1},                          // 세로
    {c:1,r:1,type:'C',rot:2,rotatable:true,num:2},   // 정답: rot=1 (E,S)
    {c:2,r:1,type:'S',rot:0},                          // 가로
    {c:3,r:1,type:'C',rot:0,rotatable:true,num:3},   // 정답: rot=2 (S,W)
    {c:3,r:2,type:'S',rot:1},
    {c:3,r:3,type:'C',rot:3,rotatable:true,num:4},   // 정답: rot=0 (N,E)
    {c:4,r:3,type:'STUB',rot:2,end:true},
  ]},
  { name:'3단계', size:5, cells:[
    {c:0,r:0,type:'STUB',rot:1,start:true},            // 위쪽에서 시작 (남쪽 개구)
    {c:0,r:1,type:'S',rot:1},
    {c:0,r:2,type:'C',rot:1,rotatable:true,num:1},   // 정답: rot=0 (N,E)
    {c:1,r:2,type:'T',rot:2,rotatable:true,num:2},   // T자 회전
    {c:2,r:2,type:'X',rot:0},                          // 십자 (고정)
    {c:3,r:2,type:'S',rot:0,rotatable:true,num:3},
    {c:4,r:2,type:'C',rot:1,rotatable:true,num:4},   // 정답: rot=2 (S,W)
    {c:4,r:3,type:'S',rot:1},
    {c:4,r:4,type:'STUB',rot:3,end:true},
    {c:2,r:3,type:'S',rot:1,rotatable:true,num:5},
    {c:2,r:4,type:'C',rot:2,rotatable:true,num:6},
  ]},
];

let curPuz = 0;
let mazeState = null;
const mazeSvg = document.getElementById('maze');

function buildPuzPick(){
  const wrap = document.getElementById('puzPick');
  wrap.innerHTML = '';
  PUZZLES.forEach((p,i)=>{
    const b = document.createElement('button');
    b.className = 'puz-btn' + (i===curPuz?' on':'');
    b.textContent = p.name;
    b.onclick = ()=>{ curPuz = i; loadPuz(); };
    wrap.appendChild(b);
  });
}
buildPuzPick();

function loadPuz(){
  buildPuzPick();
  const p = PUZZLES[curPuz];
  // 깊은 복사
  mazeState = JSON.parse(JSON.stringify(p));
  drawMaze();
  updateMazeStatus();
}

function drawMaze(){
  const p = mazeState;
  const SZ = 540, N = p.size, CS = SZ/N;
  mazeSvg.innerHTML = '';
  // 배경 셀
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('x', c*CS); bg.setAttribute('y', r*CS);
    bg.setAttribute('width', CS); bg.setAttribute('height', CS);
    bg.setAttribute('class','cell-bg');
    mazeSvg.appendChild(bg);
  }
  // 셀별 길 조각
  p.cells.forEach((cell, idx)=>{
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${cell.c*CS},${cell.r*CS})`);
    if(cell.rotatable) g.setAttribute('class','rot-cell');
    // 회전 가능 셀 표시
    if(cell.rotatable){
      const ring = document.createElementNS('http://www.w3.org/2000/svg','rect');
      ring.setAttribute('x',4); ring.setAttribute('y',4);
      ring.setAttribute('width',CS-8); ring.setAttribute('height',CS-8);
      ring.setAttribute('rx',8);
      ring.setAttribute('class','ring');
      g.appendChild(ring);
    }
    // 길 조각 (회전 적용)
    const piece = document.createElementNS('http://www.w3.org/2000/svg','g');
    piece.setAttribute('class','rot-piece');
    piece.style.transform = `rotate(${cell.rot*90}deg)`;
    piece.innerHTML = roadSvg(cell.type, CS);
    g.appendChild(piece);
    // 시작/끝 아이콘
    if(cell.start){
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', CS/2); t.setAttribute('y', CS/2 + 4);
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size', CS*0.55);
      t.textContent = '🐱';
      g.appendChild(t);
    }
    if(cell.end){
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', CS/2); t.setAttribute('y', CS/2 + 4);
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size', CS*0.55);
      t.textContent = '🏆';
      g.appendChild(t);
    }
    // 번호 뱃지
    if(cell.num){
      const bc = document.createElementNS('http://www.w3.org/2000/svg','circle');
      bc.setAttribute('cx', CS-16); bc.setAttribute('cy', 16);
      bc.setAttribute('r', 14); bc.setAttribute('class','num-badge');
      g.appendChild(bc);
      const bt = document.createElementNS('http://www.w3.org/2000/svg','text');
      bt.setAttribute('x', CS-16); bt.setAttribute('y', 16);
      bt.setAttribute('class','num-text');
      bt.textContent = cell.num;
      g.appendChild(bt);
    }
    if(cell.rotatable){
      g.addEventListener('click', ()=>{
        cell.rot = (cell.rot + 1) % 4;
        piece.style.transform = `rotate(${cell.rot*90}deg)`;
        setTimeout(updateMazeStatus, 360);
      });
    }
    mazeSvg.appendChild(g);
  });
}

function roadSvg(type, CS){
  const W = CS, H = CS, M = CS/2, RW = CS*0.35;  // 도로 폭
  const half = RW/2;
  // 기준: rot=0 일 때의 방향들
  const sides = BASE_SIDES[type];
  let paths = '';
  // 중앙 정사각형
  paths += `<rect class="road" x="${M-half}" y="${M-half}" width="${RW}" height="${RW}"/>`;
  sides.forEach(d=>{
    if(d==='E') paths += `<rect class="road" x="${M-half}" y="${M-half}" width="${W-(M-half)}" height="${RW}"/>`;
    if(d==='W') paths += `<rect class="road" x="0" y="${M-half}" width="${M+half}" height="${RW}"/>`;
    if(d==='S') paths += `<rect class="road" x="${M-half}" y="${M-half}" width="${RW}" height="${H-(M-half)}"/>`;
    if(d==='N') paths += `<rect class="road" x="${M-half}" y="0" width="${RW}" height="${M+half}"/>`;
  });
  return paths;
}

function updateMazeStatus(){
  const p = mazeState;
  const grid = {};
  p.cells.forEach(c=>{ grid[c.c+','+c.r] = c; });
  const startCell = p.cells.find(c=>c.start);
  const endCell = p.cells.find(c=>c.end);
  // BFS
  const queue = [startCell];
  const visited = new Set([startCell.c+','+startCell.r]);
  let connected = false;
  while(queue.length){
    const cur = queue.shift();
    if(cur === endCell){ connected = true; break; }
    const curSides = sidesOf(cur.type, cur.rot);
    for(const d of curSides){
      const [dx,dy] = DXY[d];
      const nc = cur.c+dx, nr = cur.r+dy;
      const key = nc+','+nr;
      if(visited.has(key)) continue;
      const nb = grid[key];
      if(!nb) continue;
      const nbSides = sidesOf(nb.type, nb.rot);
      if(nbSides.includes(OPP[d])){
        visited.add(key);
        queue.push(nb);
      }
    }
  }
  const sEl = document.getElementById('mazeStatus');
  if(connected){
    sEl.textContent = '🎉 길을 이었어! 잘했어!';
    sEl.classList.add('ok');
    document.getElementById('celebrate').classList.add('on');
  } else {
    sEl.textContent = '🐱 길 조각을 톡 눌러서 돌려봐';
    sEl.classList.remove('ok');
  }
}

document.getElementById('mazeReset').onclick = ()=>loadPuz();
document.getElementById('nextPuz').onclick = ()=>{
  document.getElementById('celebrate').classList.remove('on');
  curPuz = (curPuz+1) % PUZZLES.length;
  loadPuz();
};
document.getElementById('celebrate').addEventListener('click',(e)=>{
  if(e.target.id==='celebrate') e.currentTarget.classList.remove('on');
});

loadPuz();

function applyTransform(){
  shapeG.style.transform = `rotate(${state.rot}deg) scaleX(${state.fx}) scaleY(${state.fy})`;
}

function updateStatus(){
  let r = ((state.rot%360)+360)%360;
  let txt = `<span class="pill">회전 <b>${r}°</b></span>`;
  if(state.fx===-1) txt += `<span class="pill">↔ 좌우 뒤집힘</span>`;
  if(state.fy===-1) txt += `<span class="pill">↕ 상하 뒤집힘</span>`;
  if(r===0 && state.fx===1 && state.fy===1) txt = `<span class="pill">처음 상태야</span>`;
  statusEl.innerHTML = txt;
}

document.querySelectorAll('[data-rot]').forEach(b=>{
  b.onclick = ()=>{
    state.rot += parseInt(b.dataset.rot,10);
    applyTransform();
    setTimeout(()=>{
      if(Math.abs(state.rot) >= 720){
        shapeG.style.transition='none';
        state.rot = state.rot % 360;
        applyTransform();
        requestAnimationFrame(()=>{shapeG.style.transition='';});
      }
      updateStatus();
    }, 560);
  };
});
document.querySelectorAll('[data-flip]').forEach(b=>{
  b.onclick = ()=>{
    const d = b.dataset.flip;
    if(d==='L'||d==='R') state.fx *= -1;
    else state.fy *= -1;
    applyTransform();
    setTimeout(updateStatus, 560);
  };
});
document.getElementById('reset').onclick = ()=>{
  state.rot = 0; state.fx = 1; state.fy = 1;
  applyTransform();
  setTimeout(updateStatus, 560);
};
</script>
